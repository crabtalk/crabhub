repository = "https://github.com/notionhq/notion-mcp-server"
keywords = ["notion", "mcp", "docs", "database", "wiki"]

[mcps.notion]
command = "npx"
args = ["-y", "@notionhq/notion-mcp-server"]
env = { NOTION_TOKEN = "" }
