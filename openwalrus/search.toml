[package]
name = "search"
description = "Meta-search aggregator (DuckDuckGo, Wikipedia)"
logo = "https://openwalrus.xyz/logos/search.png"
repository = "https://github.com/aspect-build/walrus"
keywords = ["search", "web", "duckduckgo", "wikipedia"]

[services.search]
description = "Meta-search aggregator (DuckDuckGo, Wikipedia)"
kind = "hook"
command = "walrus-search"
install = { command = "bash", args = ["-c", "curl -fsSL openwalrus.xyz/install | sh -s -- --yes --service search"] }
restart = "on_failure"
