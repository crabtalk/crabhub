[package]
name = "discord"
description = "Discord bot gateway for agents"
logo = "https://openwalrus.xyz/logos/discord.png"
repository = "https://github.com/aspect-build/walrus"
keywords = ["discord", "bot", "gateway", "chat"]

[services.discord]
description = "Discord bot gateway for agents"
kind = "gateway"
command = "walrus-discord"
install = { command = "bash", args = ["-c", "curl -fsSL openwalrus.xyz/install | sh -s -- --yes --service discord"] }
restart = "on_failure"
config = { discord = { token = "" } }
