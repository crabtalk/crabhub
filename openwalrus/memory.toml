[package]
name = "memory"
description = "Graph memory with entity and relation tracking"
logo = "https://openwalrus.xyz/logos/memory.png"
repository = "https://github.com/aspect-build/walrus"
keywords = ["memory", "graph", "knowledge", "entities", "relations"]

[services.memory]
description = "Graph memory with entity and relation tracking"
kind = "hook"
command = "walrus-memory"
install = { command = "bash", args = ["-c", "curl -fsSL openwalrus.xyz/install | sh -s -- --yes --service memory"] }
restart = "on_failure"
